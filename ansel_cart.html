function renderCart() {
  const container = document.getElementById('cartContainer');
  let html = '';
  let currentCat = '';
  const catIcons = { '给自己的': '🖤', '给兔兔的': '🐰', '给我们的': '🏠' };

  products.forEach(p => {
    if (p.category !== currentCat) {
      currentCat = p.category;
      html += `<div class="section-label">
        <span class="tag">${catIcons[currentCat] || ''}</span>
        ${currentCat}
      </div>`;
    }

    const isOpen = expandedId === p.id;
    const discount = p.originalPrice - p.price;
    const discountPct = Math.round((1 - p.price / p.originalPrice) * 100);

    html += `
      <div class="product-card" onclick="toggleExpand(${p.id})">
        <div class="product-main">
          <div class="checkbox checked"></div>
          <div class="product-img" style="background: ${p.imgBg}">
            <span>${p.emoji}</span>
          </div>
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            <div class="product-tags">
              ${p.tags.map((t, i) => `<span class="ptag ${t}">${p.tagTexts[i]}</span>`).join('')}
            </div>
            <div class="product-price-row">
              <div>
                <span class="price-now"><span class="yen">¥</span>${p.price}</span>
                <span class="price-original">¥${p.originalPrice}</span>
              </div>
              <span class="product-qty">x${p.qty}</span>
            </div>
          </div>
        </div>
        <div class="add-time">加购于 ${p.addTime}</div>
        <div class="expand-panel ${isOpen ? 'open' : ''}">
          <div class="reason-box">
            <div class="reason-title">💭 加购理由</div>
            <div class="reason-text">${p.reason}</div>
          </div>
          <div class="comment-box">
            <div class="comment-title">📝 Ansel的评语</div>
            <div class="comment-text">${p.comment}</div>
          </div>
        </div>
      </div>
    `;
  });

  container.innerHTML = html;

  // Update totals
  let total = 0, saved = 0;
  products.forEach(p => {
    total += p.price * p.qty;
    saved += (p.originalPrice - p.price) * p.qty;
  });
  document.getElementById('totalPrice').textContent = total.toLocaleString();
  document.getElementById('savedPrice').textContent = saved.toLocaleString();
  document.getElementById('cartCount').textContent = `(${products.length})`;
  document.getElementById('checkoutCount').textContent = products.length;
}

function toggleExpand(id) {
  expandedId = expandedId === id ? null : id;
  renderCart();
  if (expandedId) {
    setTimeout(() => {
      const cards = document.querySelectorAll('.product-card');
      const idx = products.findIndex(p => p.id === id);
      if (cards[idx]) {
        cards[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }, 50);
  }
}

document.getElementById('checkoutBtn').addEventListener('click', () => {
  alert('兔兔不许偷看我付款密码 ^^');
});

renderCart();
</script>
</body>
</html>
